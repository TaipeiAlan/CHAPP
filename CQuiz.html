<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script>
(function(){
  var ua = navigator.userAgent || '';
  var isIOS     = /iPhone|iPad|iPod/.test(ua);
  var isAndroid = /Android/.test(ua);
  var isLine    = /Line/i.test(ua);
  var isFB      = /FBAN|FBAV|Instagram|Twitter/i.test(ua);
  var isWeChat  = /MicroMessenger/i.test(ua);
  var isAndroidWV = isAndroid && /\bwv\b/.test(ua);
  var isIOSInApp  = isIOS && !/Safari/.test(ua) && /AppleWebKit/.test(ua);
  var inApp = isLine || isFB || isWeChat || isAndroidWV || isIOSInApp;
  if (!inApp) return;

  var url = location.href;

  // ── 1. LINE iOS：openExternalBrowser=1 讓 LINE 自動改用 Safari 開啟 ──
  if (isLine && isIOS && url.indexOf('openExternalBrowser=1') === -1) {
    location.replace(url + (url.indexOf('?') >= 0 ? '&' : '?') + 'openExternalBrowser=1');
    return;
  }

  // ── 2. Android LINE / WebView：intent scheme 交給系統瀏覽器 ──
  if (isAndroid && (isLine || isAndroidWV)) {
    var intentUrl = 'intent://' + url.replace(/^https?:\/\//, '')
      + '#Intent;scheme=' + (url.indexOf('https') === 0 ? 'https' : 'http')
      + ';action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;end';
    location.href = intentUrl;
    // 若 intent 失敗（500ms 後還在），繼續顯示提示 overlay
    setTimeout(showOverlay, 500);
    return;
  }

  // ── 3. 其他 in-app（FB / IG / WeChat 等）：顯示提示 overlay ──
  document.addEventListener('DOMContentLoaded', showOverlay);

  function showOverlay() {
    if (document.getElementById('_inapp_overlay')) return; // 避免重複
    var appName = isLine ? 'LINE' : isWeChat ? 'WeChat' : isFB ? '社群應用' : 'App';

    // 逐一用 createElement 建構，避免 innerHTML+= 覆蓋 event listener
    var overlay = document.createElement('div');
    overlay.id = '_inapp_overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.93);'
      + 'display:flex;flex-direction:column;align-items:center;justify-content:center;'
      + 'padding:32px;color:white;font-family:system-ui,-apple-system,sans-serif;';

    function el(tag, style, text) {
      var e = document.createElement(tag);
      if (style) e.style.cssText = style;
      if (text)  e.textContent = text;
      return e;
    }

    overlay.appendChild(el('div','font-size:2.5rem;margin-bottom:16px;','🌐'));
    overlay.appendChild(el('div','font-size:1.2rem;font-weight:800;margin-bottom:8px;text-align:center;','用瀏覽器開啟'));

    var sub = el('div','font-size:0.88rem;opacity:0.75;text-align:center;line-height:1.6;margin-bottom:28px;');
    sub.innerHTML = '此頁面在 ' + appName + ' 內功能受限<br>請改用 Safari / Chrome 開啟完整體驗';
    overlay.appendChild(sub);

    overlay.appendChild(el('div',
      'width:100%;padding:14px;border-radius:12px;background:rgba(255,255,255,0.08);'
      + 'border:1px solid rgba(255,255,255,0.15);margin-bottom:16px;font-size:0.78rem;'
      + 'color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;', url));

    var copyBtn = el('button',
      'width:100%;padding:14px;border-radius:12px;background:#7c3aed;color:white;'
      + 'border:none;font-size:1rem;font-weight:700;cursor:pointer;', '複製網址');
    copyBtn.addEventListener('click', function() {
      var succeed = function() {
        copyBtn.textContent = '✓ 已複製！';
        copyBtn.style.background = '#059669';
        setTimeout(function(){ copyBtn.textContent='複製網址'; copyBtn.style.background='#7c3aed'; }, 2500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(succeed).catch(fallbackCopy);
      } else { fallbackCopy(); }
      function fallbackCopy() {
        var t = document.createElement('textarea');
        t.value = url; t.style.position='fixed'; t.style.opacity='0';
        document.body.appendChild(t); t.focus(); t.select();
        try { if (document.execCommand('copy')) succeed(); } catch(e) {}
        document.body.removeChild(t);
      }
    });
    overlay.appendChild(copyBtn);
    overlay.appendChild(el('div','margin-top:18px;font-size:0.8rem;opacity:0.55;text-align:center;',
      '複製後貼到瀏覽器網址列開啟'));

    document.body.style.overflow = 'hidden';
    document.body.appendChild(overlay);
  }
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國語字音測驗系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: linear-gradient(160deg, #050d1a 0%, #0a1e3d 40%, #0d2a52 100%);
      min-height: 100vh;
      padding: 16px 16px 60px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* Screens */
    .screen { display: none; }
    .screen.active { display: block; }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      color: white; padding: 12px 0 20px;
    }
    .nav-back {
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      font-size: 0.9rem; opacity: 0.85; transition: opacity 0.2s;
      background: rgba(255,255,255,0.15); padding: 6px 14px;
      border-radius: 20px; border: none; color: white;
    }
    .nav-back:hover { opacity: 1; background: rgba(255,255,255,0.25); }
    .nav-title { font-weight: 700; font-size: 1rem; color: white; }

    /* Cards */
    .card {
      background: white; border-radius: 20px; padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); margin-bottom: 16px;
    }

    /* Buttons */
    .btn {
      padding: 13px 28px; border-radius: 12px; border: none;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white; box-shadow: 0 4px 14px rgba(79,70,229,0.4);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79,70,229,0.5);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .btn-outline {
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5);
      color: white;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.25); }
    .btn-danger {
      background: transparent; border: 2px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7); font-size: 0.85rem; padding: 8px 18px;
    }
    .btn-danger:hover { border-color: #fca5a5; color: #fca5a5; }

    /* ====== HOME SCREEN ====== */
    .home-header {
      text-align: center; color: white; padding: 36px 0 28px;
    }
    .home-header h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 6px; }
    .home-header p { font-size: 0.95rem; opacity: 0.75; }

    .home-card { text-align: center; }
    .home-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .home-title { font-size: 1.6rem; font-weight: 700; color: #1f2937; margin-bottom: 6px; }
    .home-subtitle { color: #6b7280; line-height: 1.6; margin-bottom: 28px; font-size: 0.95rem; }
    .home-actions {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .home-actions .btn-primary { grid-column: 1 / -1; }
    .home-stats {
      margin-top: 20px; padding-top: 20px; border-top: 1px solid #f3f4f6;
      color: #9ca3af; font-size: 0.85rem;
    }

    /* ====== PROGRESS BAR ====== */
    .progress-sticky {
      position: sticky; top: 0; z-index: 10;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
      border-radius: 14px; padding: 12px 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 14px;
    }
    .progress-label { font-size: 0.85rem; font-weight: 600; color: #4b5563; white-space: nowrap; }
    .progress-bar-outer {
      flex: 1; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%; background: linear-gradient(90deg, #7c3aed, #4f46e5);
      border-radius: 4px; transition: width 0.35s ease;
    }
    .progress-count {
      font-size: 0.85rem; font-weight: 700; color: #4f46e5; white-space: nowrap;
    }

    /* ====== QUESTION CARD ====== */
    .q-card {
      background: white; border-radius: 18px; padding: 22px 22px 18px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.08); margin-bottom: 14px;
      transition: box-shadow 0.2s;
    }
    .q-card.answered { box-shadow: 0 2px 14px rgba(79,70,229,0.12); }

    .q-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 8px; gap: 8px;
    }
    .q-header-left {
      display: flex; align-items: baseline; flex-wrap: wrap;
      gap: 6px; flex: 1; min-width: 0;
    }
    .q-num {
      font-size: 0.72rem; font-weight: 700; color: #7c3aed;
      text-transform: uppercase; letter-spacing: 0.08em;
      background: #ede9fe; padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .q-header-left .q-sentence {
      font-size: 1.2rem; margin-bottom: 0;
    }

    .q-sentence {
      font-size: 1.35rem; font-weight: 700; color: #111827;
      margin-bottom: 4px; line-height: 1.4;
    }
    .q-target-char { color: #7c3aed; }
    .q-ask { font-size: 0.88rem; color: #9ca3af; margin-bottom: 16px; }

    /* Options */
    .options { display: grid; gap: 9px; }
    .opt-label {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px; border: 2px solid #e5e7eb; border-radius: 11px;
      cursor: pointer; transition: all 0.18s; user-select: none;
    }
    .opt-label:hover { border-color: #a78bfa; background: #faf5ff; }
    .opt-label.selected { border-color: #7c3aed; background: #f5f3ff; }

    /* Results states */
    .opt-label.res-correct { border-color: #10b981; background: #ecfdf5; cursor: default; }
    .opt-label.res-wrong   { border-color: #ef4444; background: #fef2f2; cursor: default; }
    .opt-label.res-show    { border-color: #10b981; background: #ecfdf5; cursor: default; }
    .opt-label.res-dim     { opacity: 0.45; cursor: default; }

    .opt-radio {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d1d5db;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.18s; font-size: 10px; font-weight: 700;
    }
    .opt-label.selected .opt-radio { border-color: #7c3aed; background: #7c3aed; color: white; }
    .opt-label.selected .opt-radio::after { content: '●'; color: white; font-size: 8px; }
    .opt-label.res-correct .opt-radio { border-color: #10b981; background: #10b981; color: white; }
    .opt-label.res-wrong   .opt-radio { border-color: #ef4444; background: #ef4444; color: white; }
    .opt-label.res-show    .opt-radio { border-color: #10b981; }

    .opt-key { font-weight: 700; color: #6b7280; min-width: 18px; font-size: 0.9rem; }
    .opt-text { font-size: 1.1rem; color: #1f2937; letter-spacing: 0.06em; }
    .opt-correct-tag {
      margin-left: auto; font-size: 0.72rem; font-weight: 600;
      color: #059669; background: #d1fae5; padding: 2px 8px; border-radius: 10px;
    }
    input[type="radio"] { display: none; }

    /* Submit */
    .submit-area { text-align: center; padding: 20px 0 8px; }
    .submit-hint { margin-top: 8px; font-size: 0.82rem; color: rgba(255,255,255,0.65); }

    /* ====== RESULTS SCREEN ====== */
    .score-card { text-align: center; }
    .score-ring {
      width: 128px; height: 128px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; margin: 0 auto 20px; color: white;
      box-shadow: 0 8px 24px rgba(79,70,229,0.4);
    }
    .score-num { font-size: 3rem; font-weight: 800; line-height: 1; }
    .score-denom { font-size: 0.9rem; opacity: 0.8; }
    .score-message { font-size: 1.1rem; font-weight: 600; color: #1f2937; margin-bottom: 6px; }
    .score-date { font-size: 0.82rem; color: #9ca3af; margin-bottom: 20px; }
    .result-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    .res-card {
      background: white; border-radius: 18px; padding: 20px 20px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 14px; position: relative;
    }
    .res-badge {
      position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: 700;
    }
    .res-badge.correct { background: #d1fae5; color: #059669; }
    .res-badge.wrong   { background: #fee2e2; color: #dc2626; }
    .res-explanation {
      margin-top: 12px; padding: 10px 14px; background: #fffbeb;
      border-radius: 10px; font-size: 0.85rem; color: #78350f; line-height: 1.5;
      border-left: 3px solid #f59e0b;
    }

    /* ====== HISTORY SCREEN ====== */
    .history-empty { padding: 52px; text-align: center; color: #9ca3af; font-size: 0.95rem; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; border-bottom: 1px solid #f3f4f6;
      cursor: pointer; transition: background 0.15s;
    }
    .history-item:hover { background: #faf5ff; }
    .history-item:last-child { border-bottom: none; }
    .history-date { font-size: 0.88rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .history-bar {
      height: 5px; background: #e5e7eb; border-radius: 3px;
      overflow: hidden; width: 120px;
    }
    .history-bar-fill { height: 100%; border-radius: 3px; }
    .history-score { font-size: 1.3rem; font-weight: 800; color: #4f46e5; }
    .history-pct { font-size: 0.78rem; color: #9ca3af; text-align: right; }
    .history-footer { text-align: center; padding: 16px 0 0; }

    /* responsive */
    @media (max-width: 480px) {
      .home-header h1 { font-size: 1.9rem; }
      .q-sentence { font-size: 1.2rem; }
      .opt-text { font-size: 1rem; }
    }


    /* ====== HISTORY WITH WRONG QUESTIONS ====== */
    .history-item { cursor: pointer; }
    .history-wrong-list {
      padding: 10px 22px 14px; background: #fafafa;
      border-top: 1px solid #f3f4f6;
    }
    .history-wrong-title {
      font-size: 0.72rem; font-weight: 700; color: #dc2626;
      letter-spacing: 0.06em; margin-bottom: 8px; text-transform: uppercase;
    }
    .hw-item {
      display: flex; align-items: baseline; gap: 8px;
      font-size: 0.82rem; padding: 3px 0; border-bottom: 1px solid #f3f4f6;
      flex-wrap: wrap;
    }
    .hw-item:last-child { border-bottom: none; }
    .hw-sentence { color: #374151; font-weight: 600; }
    .hw-char { color: #7c3aed; font-weight: 800; }
    .hw-correct { color: #059669; font-size: 0.9rem; letter-spacing: 0.04em; }
    .hw-wrong   { color: #dc2626; font-size: 0.9rem; letter-spacing: 0.04em; text-decoration: line-through; opacity: 0.8; }

    /* ====== HOME-ACTIONS 按鈕覆寫（白底可見色） ====== */
    .home-actions .btn-outline {
      background: rgba(124,58,237,0.07);
      border: 2px solid rgba(124,58,237,0.35);
      color: #5b21b6;
    }
    .home-actions .btn-outline:hover { background: rgba(124,58,237,0.14); }
    .home-actions .btn-warn {
      background: rgba(239,68,68,0.07);
      border: 2px solid rgba(239,68,68,0.35);
      color: #b91c1c;
    }
    .home-actions .btn-warn:hover { background: rgba(239,68,68,0.13); }
    /* ====== UNANSWERED HIGHLIGHT ====== */
    @keyframes highlight-pulse {
      0%   { background: white; box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
      25%  { background: #fef2f2; box-shadow: 0 0 0 3px rgba(239,68,68,0.4); }
      75%  { background: #fef2f2; box-shadow: 0 0 0 3px rgba(239,68,68,0.4); }
      100% { background: white; box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
    }
    .q-card.highlight-unanswered { animation: highlight-pulse 1.2s ease 2; }

    /* ====== ANSWER GRID (in score card) ====== */
    .answer-grid {
      display: grid; grid-template-columns: repeat(10,1fr);
      gap: 5px; margin: 14px 0 20px;
    }
    .ans-cell {
      aspect-ratio: 1; border-radius: 7px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; cursor: pointer;
      transition: transform 0.15s;
    }
    .ans-cell:hover { transform: scale(1.15); }
    .ans-cell.grid-correct { background: #d1fae5; color: #059669; }
    .ans-cell.grid-wrong   { background: #fee2e2; color: #dc2626; }
    .ans-cell .cell-num    { font-size: 0.58rem; opacity: 0.7; line-height: 1; }
    .ans-cell .cell-icon   { font-size: 0.75rem; line-height: 1; }

    /* ====== HOME STATS GRID ====== */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 12px; margin-bottom: 8px;
    }
    .stat-box {
      background: #f5f3ff; border-radius: 12px; padding: 12px 8px;
      text-align: center;
    }
    .stat-num  { font-size: 1.5rem; font-weight: 800; color: #4f46e5; line-height: 1.1; }
    .stat-lbl  { font-size: 0.72rem; color: #6b7280; margin-top: 2px; }
    .stat-divider {
      margin: 12px 0 8px;
      border: none; border-top: 1px solid #f3f4f6;
    }


    /* ====== RESULT VIEW TOGGLE ====== */
    .result-view-toggle {
      text-align: center; margin: 12px 0 4px;
    }
    .btn-toggle-result {
      background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.85); border-radius: 20px; padding: 6px 18px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-toggle-result:hover { background: rgba(255,255,255,0.22); }
    /* ====== WRONG BANK SCREEN ====== */
    .wb-stats-bar {
      background: white; border-radius: 16px; padding: 18px 22px;
      margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    }
    .wb-stats-left { display: flex; gap: 20px; }
    .wb-stat { text-align: center; }
    .wb-stat-num  { font-size: 1.6rem; font-weight: 800; color: #dc2626; line-height: 1; }
    .wb-stat-lbl  { font-size: 0.72rem; color: #6b7280; margin-top: 2px; }

    .wb-card {
      background: white; border-radius: 16px; padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 12px;
      display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
      align-items: start;
    }
    .wb-sentence {
      font-size: 1.25rem; font-weight: 700; color: #111827;
      grid-column: 1; line-height: 1.4;
    }
    .wb-count-badge {
      grid-column: 2; grid-row: 1 / 3;
      align-self: center;
      background: #fee2e2; color: #dc2626;
      font-size: 0.75rem; font-weight: 800;
      padding: 6px 10px; border-radius: 10px; text-align: center;
      white-space: nowrap; min-width: 44px;
    }
    .wb-count-badge .badge-num { font-size: 1.2rem; display: block; line-height: 1.1; }
    .wb-count-badge .badge-lbl { font-size: 0.65rem; opacity: 0.8; }
    .wb-pinyins {
      grid-column: 1; display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 6px; align-items: center;
    }
    .wb-pin-correct {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.05em;
      color: #059669; background: #d1fae5; padding: 3px 10px; border-radius: 8px;
    }
    .wb-pin-wrong {
      font-size: 1rem; font-weight: 700; letter-spacing: 0.05em;
      color: #dc2626; background: #fee2e2; padding: 3px 10px; border-radius: 8px;
      text-decoration: line-through; opacity: 0.85;
    }
    .wb-arrow { color: #9ca3af; font-size: 0.85rem; }
    .wb-meta {
      grid-column: 1 / 3; font-size: 0.75rem; color: #9ca3af;
      margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap;
    }
    .wb-meaning { color: #78350f; background: #fef3c7; padding: 2px 8px; border-radius: 6px; }

    .wb-empty {
      padding: 60px 20px; text-align: center; color: #9ca3af;
      background: white; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .wb-empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .wb-footer { text-align: center; padding: 12px 0 4px; }


    /* ====== FAB BUTTONS ====== */
    .fab-grade {
      position: fixed; bottom: 24px; right: 20px; z-index: 300;
      width: 68px; height: 68px; border-radius: 50%;

const QUIZ_SIZE = 20;
const STORAGE_KEY = 'Cquiz_history';
const WRONG_KEY   = 'Cquiz_wrong_bank';
const LOG_KEY     = 'Cquiz_test_log';

// ============================================================
// BOPOMOFO UTILITIES
// ============================================================
const BOPO_INITIALS = ['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ'];
const BOPO_MEDIALS  = ['ㄧ','ㄨ','ㄩ'];
const BOPO_TONES    = ['','ˊ','ˇ','ˋ','˙'];
const INITIAL_GROUPS = [
  ['ㄅ','ㄆ','ㄇ','ㄈ'],
  ['ㄉ','ㄊ','ㄋ','ㄌ'],
  ['ㄍ','ㄎ','ㄏ'],
  ['ㄐ','ㄑ','ㄒ'],
  ['ㄓ','ㄔ','ㄕ','ㄖ'],
  ['ㄗ','ㄘ','ㄙ'],
];

function parseBopo(s) {
  s = (s || '').trim();
  let tone = '';
  if (s.length && ['ˊ','ˇ','ˋ','˙'].includes(s[s.length-1])) {
    tone = s[s.length-1]; s = s.slice(0,-1);
  }
  let initial = '', medial = '';
  for (const init of BOPO_INITIALS) {
    if (s.startsWith(init)) { initial = init; s = s.slice(init.length); break; }
  }
  for (const med of BOPO_MEDIALS) {
    if (s.startsWith(med)) { medial = med; s = s.slice(med.length); break; }
  }
  return { initial, medial, final: s, tone };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ============================================================
// DATA LAYER
// ============================================================
let audioItems = [];
let allPinyinPool = new Set();

function parseCSV(raw) {
  const lines = raw.trim().split('\n');
  const headers = lines[0].split('|').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split('|');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

function initData() {
  const all = parseCSV(CSV_DATA);
  audioItems = all.filter(r => r.type && r.type.includes('音') && r.correct_pinyin && r.sentence && r.target_char);
  all.forEach(r => { if (r.correct_pinyin) allPinyinPool.add(r.correct_pinyin); });
  updateHomeStats();
  checkResumeSession();
}

// ============================================================
// WRONG ANSWER GENERATION
// ============================================================
function generateWrongAnswers(correctPinyin, hintPinyin) {
  const used = new Set([correctPinyin]);
  const result = [];
  const cp = parseBopo(correctPinyin);

  // ── Step 1: CSV hint ──
  const hint = (hintPinyin || '').trim();
  if (hint && !used.has(hint)) { result.push(hint); used.add(hint); }

  // ── Step 2: 決定「伴隨聲母」(companion initial) ──
  // 全部 4 個選項（含正確答案）合計最多只能有 2 種聲母
  let companion = null;

  // 先從 hint 取 companion
  if (result.length > 0) {
    const hp = parseBopo(result[0]);
    if (hp.initial !== cp.initial) companion = hp.initial;
  }

  // 若 hint 沒提供 companion，從同聲母群中挑一個有題庫存在的
  if (!companion) {
    const grp = INITIAL_GROUPS.find(g => g.includes(cp.initial)) || [];
    const others = shuffle(grp.filter(i => i !== cp.initial));
    for (const alt of others) {
      if ([...allPinyinPool].some(p => parseBopo(p).initial === alt)) {
        companion = alt; break;
      }
    }
    // 若同群找不到，從任意其他聲母找
    if (!companion) {
      for (const alt of shuffle(BOPO_INITIALS.filter(i => i !== cp.initial))) {
        if ([...allPinyinPool].some(p => parseBopo(p).initial === alt)) {
          companion = alt; break;
        }
      }
    }
  }

  const allowed = new Set([cp.initial, ...(companion ? [companion] : [])]);

  // ── Step 3: 從允許的聲母池中填滿 3 個干擾項 ──
  // 優先順序：同韻不同調 → 不同韻同聲母 → companion 聲母同韻 → 任意 allowed
  const priorities = [
    // (a) 同聲母同韻母，不同調（只限 1 個）
    p => { if (result.filter(x => { const xp=parseBopo(x); return xp.initial===cp.initial && xp.medial===cp.medial && xp.final===cp.final; }).length > 0) return false;
           const pp=parseBopo(p); return pp.initial===cp.initial && pp.medial===cp.medial && pp.final===cp.final; },
    // (b) 同聲母，不同韻母
    p => { const pp=parseBopo(p); return pp.initial===cp.initial && pp.final!==cp.final; },
    // (c) companion 聲母，同韻
    p => { const pp=parseBopo(p); return companion && pp.initial===companion && (pp.medial===cp.medial || pp.final===cp.final); },
    // (d) companion 聲母，任意韻
    p => { const pp=parseBopo(p); return companion && pp.initial===companion; },
    // (e) allowed 聲母，任意
    p => { const pp=parseBopo(p); return allowed.has(pp.initial); },
  ];

  const pool = shuffle([...allPinyinPool].filter(p => !used.has(p)));
  for (const pred of priorities) {
    if (result.length >= 3) break;
    for (const p of pool) {
      if (result.length >= 3) break;
      if (!used.has(p) && pred(p)) { result.push(p); used.add(p); }
    }
  }

  // ── Fallback: 任意（不受聲母限制） ──
  if (result.length < 3) {
    for (const p of pool) {
      if (result.length >= 3) break;
      if (!used.has(p)) { result.push(p); used.add(p); }
    }
  }

  return result.slice(0, 3);
}

// QUIZ STATE
// ============================================================
let currentQuiz = [];
let userAnswers = {};
let showAllResults = false;
let quizReadyTime = 0;  // 防止進入測驗瞬間的鬼點

function buildQuestion(item, idx) {
  const wrong = generateWrongAnswers(item.correct_pinyin, item.wrong_pinyin);
  const options = shuffle([item.correct_pinyin, ...wrong]);
  return {
    idx,
    sentence: item.sentence,
    targetChar: item.target_char,
    correctPinyin: item.correct_pinyin,
    meaning: item.meaning || '',
    options,
  };
}

function formatSentence(sentence, targetChar, forResult) {
  const idx = sentence.indexOf(targetChar);
  if (idx === -1) return `<strong>${escHtml(sentence)}</strong>`;
  const before = escHtml(sentence.slice(0, idx));
  const after  = escHtml(sentence.slice(idx + targetChar.length));
  const cls = forResult ? '' : ' class="q-target-char"';
  return `${before}「<span${cls}>${escHtml(targetChar)}</span>」${after}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// START QUIZ
// ============================================================
function wrongBankToItem(wb) {
  return {
    sentence:      wb.sentence,
    target_char:   wb.targetChar,
    correct_pinyin: wb.correctPinyin,
    wrong_pinyin:  wb.lastUserAnswer || '',
    meaning:       wb.meaning || '',
  };
}

function startQuiz() {
  clearQuizSession();
  userAnswers = {};
  quizReadyTime = Date.now() + 600;  // 在 render 前設定，防止鬼點
  const wb = getWrongBank();
  const wbList = Object.values(wb);
  let selected;
  if (wbList.length >= 10) {
    // 按錯誤次數排序後取前10，再隨機挑2題
    const topWrong = shuffle(wbList.sort((a, b) => b.wrongCount - a.wrongCount).slice(0, 10)).slice(0, 2);
    const wbKeys = new Set(topWrong.map(w => w.sentence + '|' + w.targetChar));
    const remaining = audioItems.filter(a => !wbKeys.has(a.sentence + '|' + a.target_char));
    selected = shuffle([...topWrong.map(wrongBankToItem), ...shuffle(remaining).slice(0, QUIZ_SIZE - 2)]);
  } else {
    selected = shuffle(audioItems).slice(0, QUIZ_SIZE);
  }
  currentQuiz = selected.map((item, i) => buildQuestion(item, i));
  renderQuiz();
  showScreen('quiz-screen');
  window.scrollTo(0, 0);
  window.addEventListener('beforeunload', _quizBeforeUnload);
}

function renderQuiz() {
  const container = document.getElementById('questions-container');
  container.innerHTML = currentQuiz.map(q => `
    <div class="q-card" id="qcard-${q.idx}">
      <div class="q-header">
        <div class="q-header-left">
          <span class="q-num">第 ${q.idx + 1} 題</span>
          <span class="q-sentence">${formatSentence(q.sentence, q.targetChar, false)}</span>
        </div>
        <span style="display:flex;align-items:flex-start;gap:6px;flex-shrink:0;">
          <span class="q-skip-badge" id="skip-badge-${q.idx}">？ 我不會</span>
          <button class="btn-skip" id="skip-btn-${q.idx}" onclick="skipAnswer(${q.idx})">我不會</button>
        </span>
      </div>
      <div class="q-ask">下列何者為「　」內字的正確讀音？</div>
      <div class="options" id="opts-${q.idx}">
        ${q.options.map((opt, oi) => `
          <div class="opt-label" id="opt-${q.idx}-${oi}"
               onclick="selectAnswer(${q.idx}, '${opt.replace(/'/g,"\\'")}', ${oi})">
            <div class="opt-radio" id="radio-${q.idx}-${oi}"></div>
            <span class="opt-key">${OPTION_KEYS[oi]}</span>
            <span class="opt-text">${escHtml(opt)}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateProgress();
}

function selectAnswer(qIdx, answer, optIdx) {
  if (Date.now() < quizReadyTime) return;  // 忽略進入後 400ms 內的鬼點
  const q = currentQuiz[qIdx];
  // Clear previous selection
  q.options.forEach((_, oi) => {
    const lbl = document.getElementById(`opt-${qIdx}-${oi}`);
    if (lbl) lbl.classList.remove('selected');
  });
  // Clear skip state if skipped
  const skipBadge = document.getElementById(`skip-badge-${qIdx}`);
  const skipBtn   = document.getElementById(`skip-btn-${qIdx}`);
  if (skipBadge) skipBadge.style.display = 'none';
  if (skipBtn)   skipBtn.classList.remove('active');
  // Mark new selection
  const lbl = document.getElementById(`opt-${qIdx}-${optIdx}`);
  if (lbl) lbl.classList.add('selected');
  // Record
  userAnswers[qIdx] = answer;
  // Mark card as answered (not skipped)
  const card = document.getElementById(`qcard-${qIdx}`);
  if (card) { card.classList.remove('skipped'); card.classList.add('answered'); }
  saveQuizSession();
  updateProgress();
  // Auto-scroll: 把答完的題目捲到畫面頂（大螢幕則置中）
  const answeredCard = document.getElementById(`qcard-${qIdx}`);
  if (answeredCard) {
    setTimeout(() => {
      const rect  = answeredCard.getBoundingClientRect();
      const cardTop = rect.top + window.pageYOffset;
      const cardH   = answeredCard.offsetHeight + 14; // 含 margin-bottom
      const stickyH = 70; // 黏性進度條高度

      if (window.innerHeight >= 5 * cardH) {
        // 大螢幕：置中；若已在中線以上則不動
        if (rect.top + rect.height / 2 <= window.innerHeight / 2) return;
        const target = cardTop - (window.innerHeight - answeredCard.offsetHeight) / 2;
        window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
      } else {
        // 一般手機螢幕：把答完的題目頂部對齊黏性列下方
        window.scrollTo({ top: Math.max(0, cardTop - stickyH), behavior: 'smooth' });
      }
    }, 160);
  }
}


function skipAnswer(qIdx) {
  const isSkipped = userAnswers.hasOwnProperty(qIdx) && userAnswers[qIdx] === '';
  if (isSkipped) {
    // Toggle off — remove skip
    delete userAnswers[qIdx];
    document.getElementById(`skip-badge-${qIdx}`).style.display = 'none';
    document.getElementById(`skip-btn-${qIdx}`).classList.remove('active');
    const card = document.getElementById(`qcard-${qIdx}`);
    if (card) { card.classList.remove('skipped'); card.classList.remove('answered'); }
  } else {
    // Skip — clear any option selection first
    const q = currentQuiz[qIdx];
    q.options.forEach((_, oi) => {
      const lbl = document.getElementById(`opt-${qIdx}-${oi}`);
      if (lbl) lbl.classList.remove('selected');
    });
    userAnswers[qIdx] = '';
    document.getElementById(`skip-badge-${qIdx}`).style.display = 'inline';
    document.getElementById(`skip-btn-${qIdx}`).classList.add('active');
    const card = document.getElementById(`qcard-${qIdx}`);
    if (card) { card.classList.remove('answered'); card.classList.add('skipped'); }
  }
  updateProgress();
}
function updateProgress() {
  const done = Object.keys(userAnswers).length;
  const total = currentQuiz.length;
  const pct = (done / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-count').textContent = `${done} / ${total}`;
  const btn = document.getElementById('submit-btn');
  const hint = document.getElementById('submit-hint');
  btn.disabled = false;
  if (done === total) {
    hint.textContent = '已完成全部題目，可以批改了！';
  } else {
    hint.textContent = `點擊「批改測驗」可跳至未填答的題目（還剩 ${total - done} 題）`;
  }
}

// ============================================================
// SUBMIT & GRADE
// ============================================================
function submitQuiz() {
  // Scroll to first unanswered if any
  const firstMissing = currentQuiz.findIndex((_, i) => !userAnswers.hasOwnProperty(i));
  if (firstMissing !== -1) {
    const card = document.getElementById(`qcard-${firstMissing}`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.remove('highlight-unanswered');
      void card.offsetWidth; // reflow to restart animation
      card.classList.add('highlight-unanswered');
      setTimeout(() => card.classList.remove('highlight-unanswered'), 2500);
    }
    return;
  }
  let score = 0;
  const details = currentQuiz.map((q, i) => {
    const userAns = userAnswers[i] || '';
    const isCorrect = userAns === q.correctPinyin;
    if (isCorrect) score++;
    return { ...q, userAnswer: userAns, isCorrect };
  });
  const record = {
    date: new Date().toLocaleString('zh-TW'),
    score,
    total: currentQuiz.length,
    details,
  };
  saveHistory(record);
  saveWrongBank(record.details);
  saveTestLog(record);
  window.removeEventListener('beforeunload', _quizBeforeUnload);
  clearQuizSession();
  showResults(record);
}

function toggleResultView() {
  showAllResults = !showAllResults;
  document.querySelectorAll('#results-container .res-card').forEach(card => {
    if (card.dataset.correct === '1') card.style.display = showAllResults ? 'block' : 'none';
  });
  const btn = document.getElementById('toggle-result-btn');
  if (btn) btn.textContent = showAllResults ? '▴ 只看錯題' : '▾ 顯示全部題目';
}

function showResults(record) {
  showAllResults = false;
  const toggleBtn = document.getElementById('toggle-result-btn'); if (toggleBtn) toggleBtn.textContent = '▾ 顯示全部題目';
  document.getElementById('res-score').textContent = record.score;
  document.getElementById('res-date').textContent = record.date;
  // Populate answer grid in summary card
  const grid = document.getElementById('res-answer-grid');
  if (grid) {
    grid.innerHTML = record.details.map((q, i) => {
      const isSkipped = !q.isCorrect && q.userAnswer === '';
      const cls  = q.isCorrect ? 'grid-correct' : isSkipped ? 'grid-skip' : 'grid-wrong';
      const icon = q.isCorrect ? '✓' : isSkipped ? '－' : '✗';
      return `<div class="ans-cell ${cls}" title="第${i+1}題: ${q.userAnswer||'未作答'}" onclick="scrollToResult(${i})">
        <span class="cell-num">${i+1}</span><span class="cell-icon">${icon}</span>
      </div>`;
    }).join('');
  }
  const pct = Math.round(record.score / record.total * 100);
  let msg = '';
  if (pct === 100)     msg = '🎉 完美！全對了！';
  else if (pct >= 80)  msg = '🌟 非常好！繼續加油！';
  else if (pct >= 60)  msg = '👍 還不錯，可以更好！';
  else if (pct >= 40)  msg = '📖 繼續努力，多加練習！';
  else                 msg = '💪 加油！多練習幾次吧！';
  document.getElementById('res-message').textContent = msg;

  const container = document.getElementById('results-container');
  container.innerHTML = record.details.map((q, i) => {
    const isCorrect = q.isCorrect;
    const optionsHtml = q.options.map((opt, oi) => {
      const isSelected  = opt === q.userAnswer;
      const isCorrectOpt = opt === q.correctPinyin;
      let cls = '';
      let indicator = '';
      let tag = '';
      if (isSelected && isCorrect)   { cls = 'res-correct'; indicator = '✓'; }
      else if (isSelected && !isCorrect) { cls = 'res-wrong'; indicator = '✕'; }
      else if (!isSelected && isCorrectOpt && !isCorrect) { cls = 'res-show'; tag = '<span class="opt-correct-tag">正確答案</span>'; }
      else { cls = 'res-dim'; }
      return `
        <div class="opt-label ${cls}">
          <div class="opt-radio ${cls}">${indicator}</div>
          <span class="opt-key">${OPTION_KEYS[oi]}</span>
          <span class="opt-text">${escHtml(opt)}</span>
          ${tag}
        </div>`;
    }).join('');

    const explanationHtml = (!isCorrect && q.meaning)
      ? `<div class="res-explanation"><strong>字義：</strong>${escHtml(q.meaning)}</div>` : '';

    return `
      <div class="res-card" data-correct="${isCorrect ? '1' : '0'}" style="${isCorrect ? 'display:none' : ''}">
        <div class="res-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓' : '✗'}</div>
        <div class="q-num" style="margin-bottom:8px;">第 ${i+1} 題</div>
        <div class="q-sentence">${formatSentence(q.sentence, q.targetChar, true)}</div>
        <div class="q-ask">下列何者為「　」內字的正確讀音？</div>
        <div class="options">${optionsHtml}</div>
        ${explanationHtml}
      </div>`;
  }).join('');

  showScreen('results-screen');
  window.scrollTo(0, 0);
}

function saveHistory(record) {
  let hist = getHistory();
  // Strip large details to save space — keep only summary + answers
  hist.unshift(record);
  if (hist.length > 50) hist = hist.slice(0, 50);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); } catch(e) {}
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}

function showHistory() {
  const hist = getHistory();
  const list = document.getElementById('history-list');
  if (!hist.length) {
    list.innerHTML = '<div class="history-empty">尚無考試記錄<br><small>完成測驗後會自動儲存</small></div>';
  } else {
    list.innerHTML = hist.map((rec, idx) => {
      const pct = Math.round(rec.score / rec.total * 100);
      const barColor = pct >= 80 ? '#10b981' : pct >= 60 ? '#f59e0b' : '#ef4444';
      const wrongs = (rec.details || []).filter(d => !d.isCorrect && d.userAnswer !== '');
      const skipped = (rec.details || []).filter(d => d.userAnswer === '').length;
      const wrongHtml = wrongs.length ? `
        <div class="history-wrong-list">
          <div class="history-wrong-title">✗ 錯題 ${wrongs.length} 題${skipped ? `　略過 ${skipped} 題` : ''}</div>
          ${wrongs.map(d => `
            <div class="hw-item">
              <span class="hw-sentence">${escHtml(d.sentence.replace(d.targetChar, ''))}</span>
              <span class="hw-char">「${escHtml(d.targetChar)}」</span>
              <span class="hw-correct">${escHtml(d.correctPinyin)}</span>
              ${d.userAnswer ? `<span class="hw-wrong">${escHtml(d.userAnswer)}</span>` : ''}
            </div>`).join('')}
        </div>` : (skipped ? `<div class="history-wrong-list"><div class="history-wrong-title">略過 ${skipped} 題</div></div>` : '');
      return `
        <div>
          <div class="history-item" onclick="viewHistoryRecord(${idx})">
            <div>
              <div class="history-date">${escHtml(rec.date)}</div>
              <div class="history-bar">
                <div class="history-bar-fill" style="width:${pct}%; background:${barColor};"></div>
              </div>
            </div>
            <div>
              <div class="history-score">${rec.score} / ${rec.total}</div>
              <div class="history-pct">${pct}%</div>
            </div>
          </div>
          ${wrongHtml}
        </div>`;
    }).join('');
  }
  showScreen('history-screen');
}

function viewHistoryRecord(idx) {
  const hist = getHistory();
  if (hist[idx]) showResults(hist[idx]);
}

function checkClearPassword() {

  return input.trim().toLowerCase() === 'edit';
}

function clearHistory() {

// ============================================================
function getWrongBank() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY) || '{}'); } catch { return {}; }
}

function saveWrongBank(details) {
  const bank = getWrongBank();
  const now  = new Date().toLocaleString('zh-TW');
  details.forEach(q => {
    if (q.isCorrect) return;
    const key = `${q.sentence}::${q.targetChar}::${q.correctPinyin}`;
    if (bank[key]) {
      bank[key].wrongCount++;
      bank[key].lastWrong      = now;
      bank[key].lastUserAnswer = q.userAnswer;
    } else {
      bank[key] = {
        sentence:       q.sentence,
        targetChar:     q.targetChar,
        correctPinyin:  q.correctPinyin,
        meaning:        q.meaning || '',
        wrongCount:     1,
        firstWrong:     now,
        lastWrong:      now,
        lastUserAnswer: q.userAnswer,
      };
    }
  });
  try { localStorage.setItem(WRONG_KEY, JSON.stringify(bank)); } catch(e) {}
}

function showWrongBank() {
  const bank   = getWrongBank();
  const items  = Object.values(bank).sort((a, b) => b.wrongCount - a.wrongCount || b.lastWrong.localeCompare(a.lastWrong));
  const statsBar = document.getElementById('wb-stats-bar');
  const list     = document.getElementById('wb-list');

  if (!items.length) {
    statsBar.style.display = 'none';
    list.innerHTML = `<div class="wb-empty">
      <div class="wb-empty-icon">📝</div>
      <div style="font-weight:600;color:#374151;margin-bottom:6px;">尚無錯題記錄</div>
      <div style="font-size:0.88rem;">完成測驗後，答錯的題目會自動收錄在這裡</div>
    </div>`;
  } else {
    statsBar.style.display = 'flex';
    document.getElementById('wb-total').textContent    = items.length;
    document.getElementById('wb-maxwrong').textContent = items[0].wrongCount;
    list.innerHTML = items.map(it => {
      const sentenceHtml = formatSentence(it.sentence, it.targetChar, false);
      const meaningHtml  = it.meaning
        ? `<span class="wb-meaning">${escHtml(it.meaning)}</span>` : '';
      return `<div class="wb-card">
        <div class="wb-sentence">${sentenceHtml}</div>
        <div class="wb-count-badge">
          <span class="badge-num">${it.wrongCount}</span>
          <span class="badge-lbl">次錯誤</span>
        </div>
        <div class="wb-pinyins">
          <span class="wb-pin-correct">${escHtml(it.correctPinyin)}</span>
          <span class="wb-arrow">←正確</span>
          ${it.lastUserAnswer ? `<span class="wb-pin-wrong">${escHtml(it.lastUserAnswer)}</span>` : ''}
        </div>
        <div class="wb-meta">
          ${meaningHtml}
          <span>最近：${escHtml(it.lastWrong)}</span>
          <span>初次：${escHtml(it.firstWrong)}</span>
        </div>
      </div>`;
    }).join('');
  }
  showScreen('wrong-bank-screen');
  window.scrollTo(0, 0);
}

function clearWrongBank() {
  if (!checkClearPassword()) { alert('密碼錯誤，無法清除。'); return; }
  if (confirm('確定要清除所有錯題記錄嗎？')) {
    localStorage.removeItem(WRONG_KEY);
    showWrongBank();
    updateHomeStats();
  }
}

function getTestLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch { return []; }
}

function saveTestLog(record) {
  let logs = getTestLog();
  const session = {
    date:  record.date,
    score: record.score,
    total: record.total,
    entries: record.details.map(q => ({
      sentence:      q.sentence,
      targetChar:    q.targetChar,
      correctPinyin: q.correctPinyin,
      meaning:       q.meaning || '',
      isCorrect:     q.isCorrect,
      isSkipped:     q.userAnswer === '',
      userPinyin:    (!q.isCorrect && q.userAnswer) ? q.userAnswer : '',
      userMeaning:   '',
    })),
  };
  logs.unshift(session);
  if (logs.length > 500) logs = logs.slice(0, 500);
  try { localStorage.setItem(LOG_KEY, JSON.stringify(logs)); } catch(e) {}
}

function showTestLog() {
  const logs = getTestLog();
  const list = document.getElementById('log-list');
  if (!logs.length) {
    list.innerHTML = `<div class="log-empty">
      <div style="font-size:2.5rem;margin-bottom:12px;">📋</div>
      <div style="font-weight:600;color:#374151;margin-bottom:6px;">尚無應考記錄</div>
      <div style="font-size:0.88rem;">完成測驗後，每道題目的結果都會記錄在這裡</div>
    </div>`;
  } else {
    list.innerHTML = logs.map((session, si) => {
      const pct = Math.round(session.score / session.total * 100);
      const rows = session.entries.map(e => {
        const rowCls  = e.isSkipped ? 'log-row-skip' : e.isCorrect ? '' : 'log-row-wrong';
        const resCls  = e.isSkipped ? 'log-skip-lbl' : e.isCorrect ? 'log-ok' : 'log-err';
        const resText = e.isSkipped ? '略過' : e.isCorrect ? '✓ 正確' : '✗ 錯誤';
        return `<tr class="${rowCls}">
          <td>${escHtml(e.sentence)}</td>
          <td style="font-weight:700;color:#7c3aed;">${escHtml(e.targetChar)}</td>
          <td style="letter-spacing:0.04em;">${escHtml(e.correctPinyin)}</td>
          <td style="color:#78350f;">${escHtml(e.meaning)}</td>
          <td class="${resCls}">${resText}</td>
          <td style="letter-spacing:0.04em;color:#dc2626;">${escHtml(e.userPinyin)}</td>
          <td style="color:#6b7280;">${escHtml(e.userMeaning)}</td>
        </tr>`;
      }).join('');
      return `<div class="log-session">
        <div class="log-session-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <span class="log-session-date">${escHtml(session.date)}</span>
          <span class="log-session-meta">${session.score} / ${session.total}（${pct}%）▾</span>
        </div>
        <div class="log-session-body" ${si > 0 ? 'style="display:none"' : ''}>
          <table class="log-table">
            <thead><tr>
              <th>原句</th><th>字</th><th>正確音</th><th>正確義</th><th>結果</th><th>寫錯音</th><th>寫錯義</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  }
  showScreen('log-screen');
  window.scrollTo(0, 0);
}

function clearTestLog() {
  if (!checkClearPassword()) { alert('密碼錯誤，無法清除。'); return; }
  if (confirm('確定要清除所有應考記錄嗎？')) {
    localStorage.removeItem(LOG_KEY);
    showTestLog();
  }
}


// ============================================================
// QUIZ SESSION SAVE / RESUME  (sessionStorage, 防重整遺失)
// ============================================================
function saveQuizSession() {
  if (!currentQuiz.length || !Object.keys(userAnswers).length) return;
  try {
    sessionStorage.setItem('Cquiz_session', JSON.stringify({
      currentQuiz, userAnswers, savedAt: new Date().toLocaleString('zh-TW'),
    }));
  } catch(e) {}
}

function clearQuizSession() {
  sessionStorage.removeItem('Cquiz_session');
}

function checkResumeSession() {
  try {
    const saved = JSON.parse(sessionStorage.getItem('Cquiz_session') || 'null');
    if (!saved || !saved.currentQuiz || !saved.currentQuiz.length) return;
    const answered = Object.keys(saved.userAnswers).length;
    if (!answered) return;
    const card = document.getElementById('resume-card');
    const meta = document.getElementById('resume-meta');
    if (card && meta) {
      meta.textContent = `已作答 ${answered} / ${saved.currentQuiz.length} 題（${saved.savedAt}）`;
      card.style.display = 'flex';
    }
  } catch(e) {}
}

function resumeQuiz() {
  try {
    const saved = JSON.parse(sessionStorage.getItem('Cquiz_session') || 'null');
    if (!saved) return;
    currentQuiz  = saved.currentQuiz;
    userAnswers  = saved.userAnswers;
    quizReadyTime = Date.now() + 600;
    renderQuiz();
    showScreen('quiz-screen');
    window.scrollTo(0, 0);
    // 還原視覺選取狀態
    Object.entries(userAnswers).forEach(([qi, ans]) => {
      const qIdx = parseInt(qi);
      if (ans === '') {
        const sb = document.getElementById(`skip-badge-${qIdx}`);
        const sk = document.getElementById(`skip-btn-${qIdx}`);
        const cd = document.getElementById(`qcard-${qIdx}`);
        if (sb) sb.style.display = 'inline';
        if (sk) sk.classList.add('active');
        if (cd) cd.classList.add('skipped');
      } else if (ans) {
        const q  = currentQuiz[qIdx];
        const oi = q ? q.options.indexOf(ans) : -1;
        if (oi >= 0) document.getElementById(`opt-${qIdx}-${oi}`)?.classList.add('selected');
        const cd = document.getElementById(`qcard-${qIdx}`);
        if (cd) cd.classList.add('answered');
      }
    });
    window.addEventListener('beforeunload', _quizBeforeUnload);
  } catch(e) { console.error(e); }
}

function discardResume() {
  clearQuizSession();
  document.getElementById('resume-card').style.display = 'none';
}

// ============================================================
// SCROLL TO RESULT ITEM
// ============================================================
function scrollToResult(idx) {
  const cards = document.querySelectorAll('#results-container .res-card');
  if (!cards[idx]) return;
  if (cards[idx].style.display === 'none') {
    showAllResults = true;
    document.querySelectorAll('#results-container .res-card').forEach(c => c.style.display = 'block');
    const btn = document.getElementById('toggle-result-btn');
    if (btn) btn.textContent = '▴ 只看錯題';
  }
  cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ============================================================
// INIT
// ============================================================
initData();
</script>
